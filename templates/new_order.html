{% extends "base.html" %}

{% block content %}
<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark"><i class="bi bi-file-earmark-plus me-2 text-primary"></i>Nieuwe Bestelbon</h2>
        <span class="badge bg-secondary fs-6 px-3 py-2">Concept</span>
    </div>

    <form method="POST" action="{{ url_for('new_order') }}" id="orderForm">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-dark text-white fw-bold">Algemene Info</div>
                    <div class="card-body">
                        <label class="small fw-bold">Bonnummer (Automatisch)</label>
                        <input type="text" name="generated_order_number" class="form-control mb-3 bg-light fw-bold" value="{{ next_ref }}" readonly>
                        
                        <label class="small fw-bold">Referentie / Project</label>
                        <textarea name="reference" class="form-control mb-3" rows="2" placeholder="Waarvoor is deze bestelling?"></textarea>
                        
                        <div class="alert alert-info py-2 small mb-0">
                            <i class="bi bi-info-circle me-1"></i> Goedkeuring vereist door: <strong>{{ approver_name }}</strong>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white fw-bold">Leverancier</div>
                    <div class="card-body">
                        <label class="small fw-bold">Bedrijfsnaam</label>
                        <div class="input-group mb-2">
                            <input type="text" id="supplierSearch" name="supplier_name" class="form-control" placeholder="Zoek of typ naam..." required autocomplete="off">
                            <button class="btn btn-outline-secondary" type="button" id="searchBtn"><i class="bi bi-search"></i></button>
                        </div>
                        <ul id="searchResults" class="list-group position-absolute w-100 shadow-sm" style="z-index: 1000; display: none;"></ul>

                        <div class="row g-2 mb-2">
                            <div class="col-8"><input type="text" id="street" name="street" class="form-control form-control-sm" placeholder="Straat"></div>
                            <div class="col-4"><input type="text" id="house_number" name="house_number" class="form-control form-control-sm" placeholder="Nr"></div>
                        </div>
                        <div class="row g-2 mb-2">
                            <div class="col-4"><input type="text" id="zip_code" name="zip_code" class="form-control form-control-sm" placeholder="Postcode"></div>
                            <div class="col-8"><input type="text" id="city" name="city" class="form-control form-control-sm" placeholder="Gemeente"></div>
                        </div>
                        <input type="text" id="supplier_vat" name="supplier_vat" class="form-control form-control-sm" placeholder="BTW Nummer (BE0...)">
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
                        <span>Bestelde Producten / Diensten</span>
                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="addRow()"><i class="bi bi-plus-lg"></i> Regel Toevoegen</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table mb-0" id="linesTable">
                                <thead class="table-light small">
                                    <tr>
                                        <th style="width: 45%;">Omschrijving</th>
                                        <th style="width: 15%;">Aantal</th>
                                        <th style="width: 15%;">Prijs/st (ex)</th>
                                        <th style="width: 15%;">BTW %</th>
                                        <th style="width: 10%;"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><input type="text" name="desc[]" class="form-control form-control-sm" required></td>
                                        <td><input type="number" name="qty[]" class="form-control form-control-sm qty" value="1" min="1" step="0.01" onchange="calcTotal()" required></td>
                                        <td><input type="number" name="price[]" class="form-control form-control-sm price" value="0.00" step="0.01" onchange="calcTotal()" required></td>
                                        <td>
                                            <select name="tax[]" class="form-select form-select-sm tax" onchange="calcTotal()">
                                                <option value="21.0">21%</option><option value="12.0">12%</option>
                                                <option value="6.0">6%</option><option value="0.0">0%</option>
                                            </select>
                                        </td>
                                        <td class="text-center"><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)"><i class="bi bi-trash"></i></button></td>
                                    </tr>
                                </tbody>
                                <tfoot class="table-light">
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold">Geschat Totaal (Incl. BTW):</td>
                                        <td colspan="2" class="fw-bold text-primary fs-5" id="grandTotal">€ 0.00</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <button type="submit" name="action" value="save" class="btn btn-light border px-4 shadow-sm">Opslaan als Concept</button>
                    <button type="submit" name="action" value="submit" class="btn btn-delacroix-orange px-5 shadow-sm fw-bold">Indienen ter Goedkeuring</button>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
    function calcTotal() {
        let total = 0;
        const rows = document.querySelectorAll('#linesTable tbody tr');
        rows.forEach(row => {
            const qty = parseFloat(row.querySelector('.qty').value) || 0;
            const price = parseFloat(row.querySelector('.price').value) || 0;
            const tax = parseFloat(row.querySelector('.tax').value) || 0;
            total += (qty * price) * (1 + (tax / 100));
        });
        document.getElementById('grandTotal').innerText = '€ ' + total.toFixed(2);
    }

    function addRow() {
        const tbody = document.querySelector('#linesTable tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" name="desc[]" class="form-control form-control-sm" required></td>
            <td><input type="number" name="qty[]" class="form-control form-control-sm qty" value="1" min="1" step="0.01" onchange="calcTotal()" required></td>
            <td><input type="number" name="price[]" class="form-control form-control-sm price" value="0.00" step="0.01" onchange="calcTotal()" required></td>
            <td><select name="tax[]" class="form-select form-select-sm tax" onchange="calcTotal()"><option value="21.0">21%</option><option value="12.0">12%</option><option value="6.0">6%</option><option value="0.0">0%</option></select></td>
            <td class="text-center"><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)"><i class="bi bi-trash"></i></button></td>
        `;
        tbody.appendChild(tr);
    }

    function removeRow(btn) {
        if (document.querySelectorAll('#linesTable tbody tr').length > 1) {
            btn.closest('tr').remove();
            calcTotal();
        }
    }
</script>
{% endblock %}
