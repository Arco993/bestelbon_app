{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="fw-bold mb-4">Afdelingsbeheer</h2>
    <div class="card shadow-sm p-4 mb-4 border-0">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Naam afdeling</label>
                    <input type="text" name="name" class="form-control" placeholder="bv. Zorg" required>
                </div>
                <div class="col-md-2">
                    <label class="small fw-bold text-muted">Unieke Code</label>
                    <input type="text" name="code" class="form-control" placeholder="bv. ZORG" required>
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">Verantwoordelijke Directie (Optioneel)</label>
                    <select name="director_id" class="form-select">
                        <option value="">Nog geen directielid koppelen...</option>
                        {% for dir in directors %}
                            <option value="{{ dir.id }}">{{ dir.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Toevoegen</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Afdeling</th>
                        <th>Code</th>
                        <th>Verantwoordelijke Directie</th>
                    </tr>
                </thead>
                <tbody>
                    {% for dept in departments %}
                    <tr>
                        <td><strong>{{ dept.name }}</strong></td>
                        <td><span class="badge bg-secondary">{{ dept.code }}</span></td>
                        <td>
                            {% if dept.director %}
                                <span class="text-primary fw-bold">{{ dept.director.username }}</span>
                            {% else %}
                                <span class="text-muted small italic">Geen verantwoordelijke</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
