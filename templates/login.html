{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-lg p-4 text-center">
            <div class="card-body">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Delacroix Logo" class="mb-4" style="height: 100px;">
                
                <h3 class="fw-bold text-dark mb-1">Uw zorg, onze zorg.</h3>
                <p class="text-muted mb-4">Log in op het bestelbonnen-portaal.</p>

                <form method="POST">
                    <div class="form-floating mb-3 text-start">
                        <input type="text" name="username" class="form-control" id="userInput" placeholder="Gebruikersnaam" required>
                        <label for="userInput">Gebruikersnaam</label>
                    </div>
                    <div class="form-floating mb-4 text-start">
                        <input type="password" name="password" class="form-control" id="passInput" placeholder="Wachtwoord" required>
                        <label for="passInput">Wachtwoord</label>
                    </div>
                    
                    <button type="submit" class="btn btn-delacroix-orange btn-lg w-100 shadow">
                        <i class="bi bi-shield-lock-fill me-2"></i> Beveiligd Inloggen
                    </button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3 text-muted small">
            &copy; 2024 Stichting M.M. Delacroix
        </div>
    </div>
</div>
{% endblock %}
