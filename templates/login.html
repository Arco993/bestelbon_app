{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px;">
        <div class="card-header bg-dark text-white text-center py-4">
            <h4 class="mb-0 fw-bold text-uppercase"><i class="bi bi-box-seam text-warning me-2"></i>Delacroix</h4>
            <small class="text-light">Bestelbonnen Portaal</small>
        </div>
        <div class="card-body p-4 bg-white">
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted text-uppercase">Gebruikersnaam</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-secondary"></i></span>
                        <input type="text" name="username" class="form-control border-start-0 ps-0" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted text-uppercase">Wachtwoord</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-secondary"></i></span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-delacroix-orange w-100 fw-bold py-2 shadow-sm">Aanmelden</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
